version: "3.9"
services:
  openclaw:
    image: ghcr.io/deltrivx/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    environment:
      - OPENCLAW_AUTO_UPDATE=true
      - OPENCLAW_UPDATE_CHANNEL=stable
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "openclaw", "--version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
