name: Build OpenClaw dist (zh-CN onboard)

on:
  workflow_call: {}
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - patches/openclaw-onboard-zhcn.patch
      - upstream/openclaw/src/commands/onboard.ts
      - translations/zh-CN/onboard.json
      - .github/workflows/build-dist-zhcn.yml

permissions:
  contents: read

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout upstream openclaw/openclaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          path: upstream-src

      - name: Apply zh-CN onboard patch
        shell: bash
        run: |
          set -euo pipefail
          cd upstream-src
          git apply --verbose ../patches/openclaw-onboard-zhcn.patch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.23.0"

      - name: Force GitHub git URLs to HTTPS (avoid SSH auth in CI)
        shell: bash
        run: |
          set -euo pipefail
          # Rewrite scp-style + ssh URLs.
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          # Some lockfiles contain the odd form https://git@github.com:org/repo.git
          git config --global url."https://github.com/".insteadOf "https://git@github.com:"
          git config --global url."https://github.com/".insteadOf "git+https://git@github.com:"
          # Some deps may use git://; force https
          git config --global url."https://github.com/".insteadOf "git://github.com/"

      - name: Patch upstream lockfile git URLs (last-resort safety net)
        shell: bash
        run: |
          set -euo pipefail
          cd upstream-src
          if [[ -f pnpm-lock.yaml ]]; then
            # Replace any remaining SSH-style URLs that pnpm might try to clone.
            sed -i \
              -e 's#git@github.com:#https://github.com/#g' \
              -e 's#ssh://git@github.com/#https://github.com/#g' \
              -e 's#git+ssh://git@github.com/#git+https://github.com/#g' \
              -e 's#https://git@github.com:#https://github.com/#g' \
              -e 's#git+https://git@github.com:#git+https://github.com/#g' \
              pnpm-lock.yaml
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream-src
          pnpm install --frozen-lockfile

      - name: Build dist
        shell: bash
        run: |
          set -euo pipefail
          cd upstream-src
          pnpm build

      - name: Prune bundled assets we do NOT want to override in the base image
        shell: bash
        run: |
          set -euo pipefail
          cd upstream-src
          # We need the base dist plus control-ui for zh-CN coverage.
          # Avoid overriding bundled extensions to reduce ABI / plugin break risk.
          rm -rf dist/extensions || true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-dist
          path: |
            upstream-src/dist/**
            upstream-src/openclaw.mjs
            upstream-src/package.json
