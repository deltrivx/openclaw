name: build-and-push

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openclaw

jobs:
  build-control-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout upstream OpenClaw (main)
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: main
          path: upstream

      - name: Patch upstream UI to default zh-CN
        run: |
          set -euo pipefail
          bash ./scripts/patch_upstream_ui.sh ./upstream

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: upstream/pnpm-lock.yaml

      - name: Install deps (upstream)
        working-directory: upstream
        run: pnpm install --frozen-lockfile

      - name: Build Control UI (upstream)
        working-directory: upstream
        env:
          OPENCLAW_PREFER_PNPM: "1"
        run: pnpm ui:build

      - name: Prepare control-ui artifact
        run: |
          set -euo pipefail
          rm -rf out && mkdir -p out/control-ui

          # ui:build writes the bundled assets to dist/control-ui
          test -f upstream/dist/control-ui/index.html
          cp -R upstream/dist/control-ui/* out/control-ui/
          test -f out/control-ui/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-ui
          path: out/control-ui
          if-no-files-found: error

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [build-control-ui]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download control-ui artifact
        uses: actions/download-artifact@v4
        with:
          name: control-ui
          path: control-ui

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
