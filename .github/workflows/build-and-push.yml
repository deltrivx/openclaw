name: Build and Push (Daily)

on:
workflow_dispatch:
schedule:
- cron: "15 2 * * *"
push:
branches: [ "main", "master" ]
paths:
- "Dockerfile"
- ".github/workflows/build-and-push.yml"

jobs:
docker:
runs-on: ubuntu-latest
permissions:
contents: read
packages: write
env:
IMAGE: ghcr.io/${{ github.repository_owner }}/openclaw
steps:
- uses: actions/checkout@v4
with:
fetch-depth: 0 # 允许 git describe 等操作（可选）

- uses: docker/setup-qemu-action@v3
- uses: docker/setup-buildx-action@v3

- name: Login GHCR
uses: docker/login-action@v3
with:
registry: ghcr.io
username: ${{ github.repository_owner }}
password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

- name: Metadata (tags/labels)
id: meta
uses: docker/metadata-action@v5
with:
images: ${{ env.IMAGE }}
tags: |
type=raw,value=latest
type=raw,value={{date 'YYYYMMDD-HHmm'}}
type=sha,format=short
labels: |
org.opencontainers.image.source=${{ github.repository }}
org.opencontainers.image.revision=${{ github.sha }}

- name: Build and push
uses: docker/build-push-action@v6
with:
context: .
file: ./Dockerfile
platforms: linux/amd64,linux/arm64
pull: true
push: true
# 首次可打开 no-cache: true 强制刷新；跑通后可删除
no-cache: true
tags: ${{ steps.meta.outputs.tags }}
labels: ${{ steps.meta.outputs.labels }}
build-args: |
GIT_COMMIT=${{ github.sha }}
BUILD_DATE=${{ steps.meta.outputs.created || github.run_id }}
