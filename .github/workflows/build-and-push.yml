name: Build and Push (Daily)

on:
schedule:
- cron: "15 2 * * *"
push:
branches: [ main, master ]
paths:
- "Dockerfile"
- ".github/workflows/build-and-push.yml"
workflow_dispatch: {}

jobs:
build:
runs-on: ubuntu-latest
permissions:
contents: read
packages: write
env:
IMAGE_NAME: ghcr.io/${{ github.repository }} # e.g. ghcr.io/deltrivx/openclaw（全小写）
steps:
- uses: actions/checkout@v4

- uses: docker/setup-qemu-action@v3
- uses: docker/setup-buildx-action@v3

- name: Normalize image name to lowercase
id: img
run: |
echo "name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

- name: Login to GHCR
uses: docker/login-action@v3
with:
registry: ghcr.io
username: ${{ github.actor }}
password: ${{ secrets.GITHUB_TOKEN }}

- name: Extract metadata
id: meta
uses: docker/metadata-action@v5
with:
images: ${{ steps.img.outputs.name }}
tags: |
type=raw,value=latest
type=raw,value={{date 'YYYYMMDD-HHmm'}}

- name: Build and push
uses: docker/build-push-action@v6
with:
context: .
file: ./Dockerfile
push: true
pull: true
platforms: linux/amd64,linux/arm64
tags: ${{ steps.meta.outputs.tags }}
labels: ${{ steps.meta.outputs.labels }}
cache-from: type=gha
cache-to: type=gha,mode=max
# build-args: | # 可选：如需自定义直链避开限流
# PIPER_WHEEL_URL=...
# PIPER_URL_MODEL_ONNX=...
# PIPER_URL_MODEL_JSON=...
