name: Build and Push (Daily)

on:
schedule:
- cron: "15 2 * * *" # 每日 02:15 UTC（北京+8 为 10:15）
push:
branches: [ main, master ]
paths:
- "Dockerfile"
- ".github/workflows/build-and-push.yml"
workflow_dispatch: {}

jobs:
build:
runs-on: ubuntu-latest
permissions:
contents: read
packages: write
concurrency:
group: build-openclaw-ghcr
cancel-in-progress: false
env:
IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openclaw
steps:
- name: Checkout
uses: actions/checkout@v4
- name: Set up QEMU
uses: docker/setup-qemu-action@v3
- name: Set up Buildx
uses: docker/setup-buildx-action@v3
- name: Login to GHCR
uses: docker/login-action@v3
with:
registry: ghcr.io
username: ${{ github.actor }}
password: ${{ secrets.GITHUB_TOKEN }}
- name: Extract metadata
id: meta
uses: docker/metadata-action@v5
with:
images: ${{ env.IMAGE_NAME }}
tags: |
type=raw,value=latest
type=raw,value={{date 'YYYYMMDD-HHmm'}}
- name: Build and push (multi-arch)
uses: docker/build-push-action@v6
with:
context: .
file: ./Dockerfile
push: true
pull: true
platforms: linux/amd64,linux/arm64
tags: ${{ steps.meta.outputs.tags }}
labels: ${{ steps.meta.outputs.labels }}
cache-from: type=gha
cache-to: type=gha,mode=max
# 可选构建参数（如需自定义直链避开限流）
# build-args: |
# PIPER_WHEEL_URL=https://your.mirror/piper_tts-1.4.1-...whl
# PIPER_URL_MODEL_ONNX=https://your.mirror/zh-CN-huayan-medium.onnx
# PIPER_URL_MODEL_JSON=https://your.mirror/zh-CN-huayan-medium.onnx.json
