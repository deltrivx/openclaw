name: Docker GHCR Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'bin/**'
      - 'docs/**'
      - 'scripts/**'
      - 'translations/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch: {}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: deltrivx
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/deltrivx/openclaw:latest
          provenance: false
          sbom: false

      - name: Image digest
        run: echo "digest=${{ steps.build-and-push.outputs.digest }}"