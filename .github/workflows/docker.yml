name: Docker GHCR Build

# note: this workflow builds a zh-CN dist artifact first, then bakes it into the image.

on:
  push:
    branches: ["main"]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker.yml
      - .github/workflows/build-dist-zhcn.yml
      - patches/**
      - upstream/**
      - translations/**

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-dist:
    uses: ./.github/workflows/build-dist-zhcn.yml

  build-and-push:
    needs: build-dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Download upstream dist artifact (zh-CN build)
        uses: actions/download-artifact@v4
        with:
          name: openclaw-dist
          path: ci-dist

      - name: Debug: list ci-dist contents
        shell: bash
        run: |
          set -euo pipefail
          echo "== ci-dist tree =="
          ls -la
          find ci-dist -maxdepth 3 -print || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/deltrivx/openclaw:latest
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
