name: Docker GHCR Build

on:
  push:
    branches: ["main"]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker.yml
      - .github/workflows/build-dist-zhcn.yml
      - patches/**
      - upstream/**
      - translations/**
  workflow_dispatch: {}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-dist:
    uses: ./.github/workflows/build-dist-zhcn.yml
    permissions:
      contents: read

  build-and-push:
    needs: build-dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-dist
          path: injected

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/deltrivx/openclaw:latest
          provenance: false
          sbom: false
          build-args: |
            INJECT_DIST=1
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
