name: Docker GHCR Build

on:
  push:
    branches: ["main"]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker.yml
      - scripts/patch_onboard_dist.py
      - translations/**
      - scripts/**
      - patches/**
      - upstream/**
  workflow_dispatch: {}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Verify GHCR_TOKEN has read:packages (diagnostic)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          echo "[diag] checking read access to GitHub Packages versions API"
          url="https://api.github.com/user/packages/container/openclaw/versions?per_page=1"
          code=$(curl -sS -o /tmp/pkg.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GHCR_TOKEN }}" \
            "$url" || true)
          echo "[diag] status=$code"
          if [[ "$code" == "200" ]]; then
            echo "[diag] ✅ GHCR_TOKEN can read package versions (read:packages likely present)"
            # Print minimal, non-sensitive fields
            python3 - <<'PY'
import json
j=json.load(open('/tmp/pkg.json'))
if isinstance(j,list) and j:
  v=j[0]
  print('[diag] latest_version_id=', v.get('id'))
  print('[diag] created_at=', v.get('created_at'))
else:
  print('[diag] no versions returned')
PY
          else
            echo "[diag] ❌ cannot read package versions (likely missing read:packages or token not accepted)"
            cat /tmp/pkg.json || true
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/deltrivx/openclaw:latest
          provenance: false
          sbom: false
