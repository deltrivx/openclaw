name: build-ghcr

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Preflight syntax check (all onboarding files)
        run: |
          node -c src/cli/program/register.onboard.ts
          find src/commands -maxdepth 1 -name 'onboard-*.ts' -print0 | xargs -0 -n1 node -c
          find src/wizard -maxdepth 1 -name '*.ts' -print0 | xargs -0 -n1 node -c

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/deltrivx/openclaw:latest
